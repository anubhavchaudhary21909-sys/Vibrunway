<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibrunway Official Notice</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #020617, #0f172a);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
    }

    .card {
        width: 90%;
        max-width: 420px;
        background: rgba(30, 41, 59, 0.85);
        border-radius: 20px;
        padding: 35px 25px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
        font-size: 26px;
        margin-bottom: 15px;
        color: #38bdf8;
    }

    p {
        font-size: 15px;
        line-height: 1.6;
        color: #cbd5f5;
        margin-bottom: 25px;
    }

    .alert {
        background: rgba(239,68,68,0.15);
        color: #f87171;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
    }

    .btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #22c55e, #4ade80);
        color: #000;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.06);
        box-shadow: 0 0 20px rgba(34,197,94,0.7);
    }

    .small {
        margin-top: 18px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Important Notice</h1>

    <div class="alert">
        ⚠️ Fake website detected
    </div>

    <p>
        Me aap sabhi ko batana chahata hu ki kisi "L" ne hamara web code copy karke fake website bana li hai.
        <br><br>
        Safe rehne ke liye sirf neeche diye gaye official link par hi visit karein.
    </p>

    <a href="https://vibrunway.lovable.app" class="btn">
        Visit Official Vibrunway
    </a>

    <div class="small">
        Click the button to continue safely
    </div>
</div>

</body>
</html>
